---
- name: Download .env file
  get_url:
    url: "https://gitlab.cee.redhat.com/oamg/convert2rhel/convert2rhel-secrets/-/raw/main/.env"
    dest: "/tmp/.env"
    validate_certs: false

- name: Load the CACERT_URL variable from .env file
  shell: cat /tmp/.env | grep -E "^CACERT_URL=" | cut -d "=" -f2
  register: url_var
  no_log: True

- name: Download the internal CA certificate
  get_url:
    url: "{{ url_var.stdout }}"
    dest: /etc/pki/ca-trust/source/anchors/RH-IT-Root-CA.crt
  no_log: true

- name: Add the certificate to trusted CA's
  shell: update-ca-trust
  no_log: true
